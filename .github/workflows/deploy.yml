name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Build target
        required: true
        default: github-pages
        type: choice
        options:
          - github-pages
          - custom-domain

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'custom-domain' && 'https://aarontthsieh.com' || 'https://kavare.github.io' }}
      BASE_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'custom-domain' && '/' || '/cttr' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
