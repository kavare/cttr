<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="11" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Meridian arc -->
  <ellipse cx="16" cy="16" rx="5" ry="11" stroke="#1a1a1a" stroke-width="1.2" fill="none"/>
  <!-- Equator line -->
  <ellipse cx="16" cy="16" rx="11" ry="3.5" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <!-- Arrow: a small diagonal path breaking out of the globe, suggesting departure -->
  <path d="M23 9 L28 4" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M28 4 L24 4.5 M28 4 L27.5 8" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
